version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: enrollment_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: enrollment_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - enrollment_network

  # Mongo Express - Visualizador web de MongoDB
  mongo-express:
    image: mongo-express:1.0.0
    container_name: enrollment_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - enrollment_network

  # Spring WebFlux Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enrollment_app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/enrollment_db?authSource=admin
      JWT_SECRET: mySecretKey123456789012345678901234567890
      JWT_EXPIRATION: 86400
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    networks:
      - enrollment_network
    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:
    driver: local

networks:
  enrollment_network:
    driver: bridge 